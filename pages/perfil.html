<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PetCare Planner | Mis Mascotas</title>
        <link rel="stylesheet" href="../assets/css/global.css">
        <link rel="stylesheet" href="../assets/css/perfil.css">
    </head>
    <body>
        <header>
            <nav>
                <div class="logo">🐾 PetCare Planner</div>
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="../pages/agenda.html">Agenda</a></li>
                    <li><a href="../pages/perfil.html">Mis Mascotas</a></li>
                </ul>   
            </nav>
        </header>

        <main>
            <h1>Registro del Perfil</h1>    
            <div class="layout-container">
                
                <form class="form-group" id="pet-form">
                    <label for="full-name">Nombre</label>
                    <input type="text" id="full-name" name="full_name" placeholder="Ej: Firulais" required>

                    <label for="gender">Género</label>
                    <select id="gender" name="gender" class="campo" required>
                        <option value="" disabled selected>Selecciona un género</option>
                        <option value="macho">Macho</option>
                        <option value="hembra">Hembra</option>
                        
                    </select>

                    <label for="species">Especie</label>
                    <select id="species" name="species" class="campo" required>
                        <option value="" disabled selected>Selecciona una especie</option>
                        <option value="perro">Perro</option>
                        <option value="gato">Gato</option>
                        <option value="otro">Otro</option>
                    </select>

                    <label for="race">Raza</label> 
                    <input type="text" id="race" name="race" placeholder="Ej: Labrador" required>

                    <label for="birth-date">Fecha de nacimiento</label>
                    <input type="date" id="birth-date" name="birth_date" class="field" required>

                    <label for="weight">Peso (kg)</label>
                    <input type="number" step="any" id="weight" name="weight" class="field" placeholder="Ej: 5" required>

                    <label for="vaccines">¿Presenta las Vacunas al día?</label>
                    <select id="vaccines" name="vaccines" class="field" required>
                        <option value="" disabled selected>Selecciona una opción</option>
                        <option value="si">Sí</option>
                        <option value="no">No</option>
                    </select>

                    <label for="observations">Observaciones</label>
                    <textarea id="observations" name="observations" placeholder="Ej: Alérgica al pollo"></textarea>

                    <button type="submit" class="btn-primary">Guardar ficha</button>
                </form>

                <section class="container-profile" aria-labelledby="titulo-perfil">
                    <h2>Perfil</h2>
                    <div class="card-mascota" id="profile-content">
                        <p>Aún no has guardado ninguna ficha.</p>
                    </div>
                </section>
            </div>
        </main>

        <script src="../assets/js/storage.js"></script>    
        <script src="../assets/js/perfil.js"></script>
    </body>
</html>
