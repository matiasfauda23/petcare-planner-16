<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PetCare Planner | Mis Mascotas</title>
        <link rel="stylesheet" href="../assets/css/global.css">
        <link rel="stylesheet" href="../assets/css/perfil.css">
    </head>

    <!--Estructura del perfil-->
    <body>
        <header>
            <nav>
                <div class="logo">🐾 PetCare Planner</div>
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="agenda.html">Agenda</a></li>
                    <li><a href="perfil.html">Mis Mascotas</a></li>
                </ul>   
            </nav>
        </header>

        <!--Seccion principal de registro de la mascota-->
        <main>
            <h1>Registro del Perfil Mascota</h1>     
            <div class="layout-container">
                <form class="form-group" id="pet-form">
                    <label for="full-name">Nombre</label>
                    <input type="text" id="full-name" name="full_name" placeholder="Ej: Firulais">

                    <label for="gender">Género</label>
                    <select id="gender" name="gender" class="campo">
                        <option value="male">Macho</option>
                        <option value="female">Hembra</option>
                    </select>

                    <label for="species">Especie</label>
                    <select id="species" name="species" class="campo">
                        <option value="dog">Perro</option>
                        <option value="cat">Gato</option>
                        <option value="other">Otro</option>
                    </select>

                    <label for="race">Raza</label> 
                    <input type="text" id="race" name="race" placeholder="Ej: Labrador">

                    <label for="birth-date">Fecha de nacimiento</label>
                    <input type="date" id="birth-date" name="birth_date" class="field">

                    <label for="weight">Peso (kg)</label>
                    <input type="number" id="weight" name="weight" class="field" placeholder="Ej: 5">

                    <label for="vaccines">¿Presenta las Vacunas al día?</label>
                    <select id="vaccines" name="vaccines" class="field">
                        <option value="yes">Sí</option>
                        <option value="no">No</option>
                    </select>

                    <label for="observations">Observaciones</label>
                    <textarea id="observations" name="observations" placeholder="Ej: Alérgica al pollo"></textarea>

                    <button type="submit" class="btn-primary">Guardar ficha</button>
                </form>

                <!--seccion de perfil definitivo luego de completar el formulario-->
                <section class="container-profile" aria-labelledby="titulo-perfil">
                    <h2>Perfil de la mascota</h2>
                    <div class="card-mascota">
                        <p>Aún no has guardado ninguna ficha.</p>
                    </div>
                </section>
            </div>
        </main>

        <script src="../assets/js/storage.js"></script>
        <script src="../assets/js/main.js"></script>
        <script src="../assets/js/perfil.js"></script>
    </body>
</html>
